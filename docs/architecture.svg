<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#57606a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0969da"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#ffffff" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#d0d7de" stroke-width="1" rx="12"/>

  <!-- ═══════════════ CLIENTS COLUMN ═══════════════ -->
  <rect x="18" y="18" width="168" height="384" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" rx="10" filter="url(#shadow)"/>
  <text x="102" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#57606a" letter-spacing="1">CLIENTS</text>

  <!-- Voice -->
  <rect x="34" y="58" width="136" height="64" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" rx="8"/>
  <text x="55" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="20">📱</text>
  <text x="84" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1a7f37">Voice</text>
  <text x="84" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">margaret-voice</text>
  <text x="84" y="111" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">WebSocket / WS</text>

  <!-- Slack -->
  <rect x="34" y="138" width="136" height="64" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" rx="8"/>
  <text x="55" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="20">💬</text>
  <text x="84" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1a7f37">Slack</text>
  <text x="84" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">DM / threads</text>
  <text x="84" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">Socket Mode</text>

  <!-- Web UI -->
  <rect x="34" y="218" width="136" height="64" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" rx="8"/>
  <text x="55" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="20">🌐</text>
  <text x="84" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1a7f37">Web UI</text>
  <text x="84" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">session viewer</text>
  <text x="84" y="271" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">REST + SSE</text>

  <!-- CLI -->
  <rect x="34" y="298" width="136" height="64" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" rx="8"/>
  <text x="55" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="20">🖥️</text>
  <text x="84" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#1a7f37">Local CLI</text>
  <text x="84" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">dev / debug</text>
  <text x="84" y="351" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">REST + SSE</text>

  <!-- ═══════════════ ARROWS: CLIENTS → GATEWAY ═══════════════ -->
  <!-- fan lines from each client to gateway left edge center y=210 -->
  <line x1="170" y1="90" x2="242" y2="200" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="170" x2="242" y2="205" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="250" x2="242" y2="215" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="170" y1="330" x2="242" y2="220" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ═══════════════ GATEWAY BOX ═══════════════ -->
  <rect x="244" y="18" width="368" height="384" fill="#0969da" rx="10" filter="url(#shadow)"/>
  <rect x="244" y="18" width="368" height="384" fill="none" stroke="#0550ae" stroke-width="1.5" rx="10"/>

  <!-- Gateway title -->
  <text x="428" y="50" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ffffff">Margaret Gateway</text>
  <text x="428" y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#cae8ff">REST + SSE  ·  FastAPI  ·  Python 3.11+</text>

  <!-- REST+SSE API -->
  <rect x="264" y="82" width="328" height="58" fill="#0550ae" rx="7"/>
  <text x="428" y="106" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#79c0ff">REST + SSE API</text>
  <text x="428" y="124" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">GET /agents  ·  POST /sessions  ·  POST /messages/stream  ·  WS /ws</text>

  <!-- Session Manager -->
  <rect x="264" y="152" width="152" height="68" fill="#0550ae" rx="7"/>
  <text x="340" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#79c0ff">Session Manager</text>
  <text x="340" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">create / resume</text>
  <text x="340" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">model_id binding</text>

  <!-- Adapter Registry -->
  <rect x="440" y="152" width="152" height="68" fill="#0550ae" rx="7"/>
  <text x="516" y="176" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#79c0ff">Adapter Registry</text>
  <text x="516" y="193" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">SDK / CLI strategy</text>
  <text x="516" y="208" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">per-app adapter</text>

  <!-- Event Store -->
  <rect x="264" y="232" width="152" height="68" fill="#0550ae" rx="7"/>
  <text x="340" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#79c0ff">Event Store</text>
  <text x="340" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">SQLite</text>
  <text x="340" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">session history</text>

  <!-- RAG Memory -->
  <rect x="440" y="232" width="152" height="68" fill="#0550ae" rx="7"/>
  <text x="516" y="256" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#79c0ff">RAG Memory</text>
  <text x="516" y="273" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">LightRAG</text>
  <text x="516" y="288" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">semantic context</text>

  <!-- Slack Bridge -->
  <rect x="264" y="312" width="328" height="58" fill="#0550ae" rx="7"/>
  <text x="428" y="336" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#79c0ff">Embedded Slack Bridge</text>
  <text x="428" y="354" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#cae8ff">Socket Mode  ·  DM threads  ·  streaming replies  ·  user workspaces</text>

  <!-- ═══════════════ ARROWS: GATEWAY → BACKENDS ═══════════════ -->
  <line x1="612" y1="200" x2="684" y2="90" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="612" y1="205" x2="684" y2="170" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="612" y1="215" x2="684" y2="250" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="612" y1="220" x2="684" y2="330" stroke="#57606a" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- adapter label on arrow -->
  <text x="642" y="196" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#8c959f" transform="rotate(-30,642,196)">adapter</text>

  <!-- ═══════════════ BACKENDS COLUMN ═══════════════ -->
  <rect x="686" y="18" width="196" height="384" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" rx="10" filter="url(#shadow)"/>
  <text x="784" y="45" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#57606a" letter-spacing="1">AI BACKENDS</text>

  <!-- Codex -->
  <rect x="702" y="58" width="164" height="64" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5" rx="8"/>
  <text x="720" y="82" font-family="system-ui,-apple-system,sans-serif" font-size="20">⚡</text>
  <text x="748" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7d4e00">Codex</text>
  <text x="748" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">OpenAI Codex CLI</text>
  <text x="748" y="111" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">SDK / CLI</text>

  <!-- OpenCode -->
  <rect x="702" y="138" width="164" height="64" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5" rx="8"/>
  <text x="720" y="162" font-family="system-ui,-apple-system,sans-serif" font-size="20">🔧</text>
  <text x="748" y="160" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7d4e00">OpenCode</text>
  <text x="748" y="176" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">OpenCode CLI</text>
  <text x="748" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">SDK / CLI</text>

  <!-- Claude Code -->
  <rect x="702" y="218" width="164" height="64" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5" rx="8"/>
  <text x="720" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="20">🤖</text>
  <text x="748" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7d4e00">Claude Code</text>
  <text x="748" y="256" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">Anthropic CLI</text>
  <text x="748" y="271" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">SDK / CLI</text>

  <!-- Copilot -->
  <rect x="702" y="298" width="164" height="64" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5" rx="8"/>
  <text x="720" y="322" font-family="system-ui,-apple-system,sans-serif" font-size="20">🐙</text>
  <text x="748" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7d4e00">Copilot</text>
  <text x="748" y="336" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#57606a">GitHub Copilot CLI</text>
  <text x="748" y="351" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#8c959f">SDK / CLI</text>

</svg>
